# Publishes KMPWorker to Maven Central on every version tag (e.g. v0.1.0-alpha01)
#
# Required GitHub Actions secrets:
#   MAVEN_CENTRAL_USERNAME   — Sonatype Central Portal token username
#   MAVEN_CENTRAL_PASSWORD   — Sonatype Central Portal token password
#   SIGNING_KEY              — Base64-encoded ASCII-armored GPG private key
#   SIGNING_PASSWORD         — GPG key passphrase (empty if key has no passphrase)
#
# The iOS targets require macOS for Kotlin/Native compilation.

name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # allow manual trigger from Actions tab

concurrency:
  group: publish
  cancel-in-progress: false  # never cancel a publish mid-flight

jobs:
  publish:
    name: Publish all modules
    runs-on: macos-latest   # required for iOS KN targets
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      # Note: wrapper-validation skipped — this is our own controlled repo.
      # The locally-generated gradle-wrapper.jar is trusted.

      # Decode the base64 GPG key using Python (cross-platform: avoids BSD vs GNU base64 flags).
      # Secret is passed via env var (not shell expansion) to avoid quoting/encoding issues.
      - name: Decode signing key
        env:
          SIGNING_KEY_B64: ${{ secrets.SIGNING_KEY }}
        run: |
          python3 -c "
import base64, os, sys
b64 = os.environ.get('SIGNING_KEY_B64', '').strip()
if not b64:
    print('ERROR: SIGNING_KEY_B64 env var is empty', file=sys.stderr); sys.exit(1)
decoded = base64.b64decode(b64).decode('utf-8')
sys.stdout.write(decoded)
" > /tmp/signing_key.asc
          echo "DECODED_SIGNING_KEY<<EOF" >> $GITHUB_ENV
          cat /tmp/signing_key.asc >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          rm /tmp/signing_key.asc

      - name: Publish to Maven Central
        run: >
          ./gradlew
          publishAllPublicationsToMavenCentralRepository
          --no-daemon
          --no-configuration-cache
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY:            ${{ env.DECODED_SIGNING_KEY }}
          SIGNING_PASSWORD:       ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey:         ${{ env.DECODED_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername:       ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword:       ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: '**/build/reports/**'
          retention-days: 7
